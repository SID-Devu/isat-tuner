name: ISAT Auto-Tune

on:
  push:
    paths:
      - '**.onnx'
      - 'isat/**'
  pull_request:
    paths:
      - '**.onnx'
      - 'isat/**'
  workflow_dispatch:
    inputs:
      model_path:
        description: 'Path to ONNX model'
        default: 'model.onnx'
      warmup:
        description: 'Warmup iterations'
        default: '3'
      runs:
        description: 'Measured iterations'
        default: '5'
      profile:
        description: 'Tuning profile (edge/cloud/latency/throughput/quick)'
        default: 'quick'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ISAT
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

  tune:
    runs-on: [self-hosted, gpu, rocm]
    needs: test
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ISAT
        run: pip install -e ".[all]"

      - name: Hardware Info
        run: isat hwinfo

      - name: Model Inspection
        run: isat inspect ${{ github.event.inputs.model_path }}

      - name: Auto-Tune
        run: |
          isat tune ${{ github.event.inputs.model_path }} \
            --warmup ${{ github.event.inputs.warmup }} \
            --runs ${{ github.event.inputs.runs }} \
            --profile ${{ github.event.inputs.profile }} \
            --output-dir isat_output \
            --verbose

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: isat-results-${{ github.run_number }}
          path: |
            isat_output/
            isat_results.db
          retention-days: 90
